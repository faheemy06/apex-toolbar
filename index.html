<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Apex Toolbar</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://appsforoffice.microsoft.com/lib/1.1/hosted/office.js" type="text/javascript"></script>
</head>
<body>

  <div id="toolbar">
    <div id="drag-handle">
      <span></span><span></span><span></span>
      <span></span><span></span><span></span>
    </div>
    
    <div class="button-grid">
      <button class="tool-btn" id="btn-sum" title="AutoSum">Σ</button>
      <button class="tool-btn" id="btn-vat" title="Add 20% VAT">%</button>
      
      <button class="tool-btn" id="btn-currency" title="Format Currency">£</button>
      <button class="tool-btn" id="btn-border" title="Toggle Borders">⊞</button>
      
      <button class="tool-btn" id="btn-clear" title="Clear Formatting">⌫</button>
      <button class="tool-btn" id="btn-audit" title="Trace Dependents">→</button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
