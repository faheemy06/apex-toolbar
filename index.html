<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=Edge" />
    <title>El-Toolbar</title>
    <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js" type="text/javascript"></script>
    <link rel="stylesheet" href="style.css" type="text/css" />
</head>
<body>

  <div id="toolbar">
    <div id="drag-handle">
      <span></span><span></span><span></span>
      <span></span><span></span><span></span>
    </div>
    <div id="btn-grid">
      <button class="tool-btn" id="btn-format" title="Currency Style (£)">£</button>
      <button class="tool-btn" id="btn-sum"    title="Smart AutoSum">∑</button>
      <button class="tool-btn" id="btn-audit"  title="Audit X-Ray
          [Key: 🔵 Formula | 🟠 Hardcoded | 🔴 Error]">⋈</button>
      <button class="tool-btn" id="btn-vat"    title="Add 20% VAT">VAT</button>
      <button class="tool-btn" id="btn-delta"  title="Variance Δ%">Δ%</button>
      <button class="tool-btn" id="btn-freeze" title="Freeze Row">❄</button>
      <button class="tool-btn" id="btn-clean"  title="Clear Formats">⌫</button>
      <button class="tool-btn" id="btn-unfreeze" title="Unfreeze">□</button>
    </div>
  </div>

  <script src="app.js" type="text/javascript"></script>
</body>
</html>
